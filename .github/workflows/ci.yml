name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-types-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          # Both extras: mypy needs to see optional deps (rich-pixels)
          # to keep the "# type: ignore" markers in mermaid_card.py
          # honest — without them, mypy flips "Unused type: ignore" on
          # the rich-pixels ImportError fallback.
          pip install -e ".[dev,diagrams]"

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Types (mypy)
        run: mypy code_scalpel/

      - name: Tests (no LLM)
        run: pytest -q
